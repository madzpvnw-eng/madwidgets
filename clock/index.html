<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Clock Widget</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#F5EDE9;
    font-family:Arial,sans-serif;
}

#clock{
    font-size:48px;
    font-weight:bold;
    color:#703B3B;
}
</style>

</head>
<body>

<div id="clock"></div>

<script>
function updateClock(){
    const now = new Date();

    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString("id-ID");
}

updateClock();
setInterval(updateClock,1000);
</script>

</body>
</html>
