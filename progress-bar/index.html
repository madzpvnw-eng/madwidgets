<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Progress Bar</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;

height:100vh;

background:#ffffff;

}

.card{

width:360px;

background:#F5EDE9;

padding:30px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

text-align:center;

}

h2{

color:#703B3B;

margin-bottom:25px;

}

.progress{

width:100%;

height:18px;

background:#e8d8d2;

border-radius:20px;

overflow:hidden;

margin:20px 0;

}

.fill{

height:100%;

width:70%;

background:#703B3B;

border-radius:20px;

transition:.3s;

}

.percent{

font-size:34px;

font-weight:bold;

color:#703B3B;

margin-bottom:20px;

}

input{

width:100%;

cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<h2>Progress</h2>

<div class="percent" id="percent">
70%
</div>

<div class="progress">

<div class="fill" id="fill"></div>

</div>

<input
type="range"
min="0"
max="100"
value="70"
id="slider"
>

</div>

<script>

const slider=document.getElementById("slider");

const fill=document.getElementById("fill");

const percent=document.getElementById("percent");

slider.oninput=function(){

fill.style.width=this.value+"%";

percent.innerHTML=this.value+"%";

}

</script>

</body>
</html>
