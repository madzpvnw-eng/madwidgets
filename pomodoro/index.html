<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pomodoro Timer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;

height:100vh;

background:#ffffff;

}

.card{

width:320px;

background:#F5EDE9;

padding:35px;

border-radius:20px;

text-align:center;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

h2{

color:#703B3B;

margin-bottom:20px;

font-size:30px;

}

.timer{

font-size:64px;

font-weight:bold;

color:#703B3B;

margin-bottom:30px;

}

.buttons{

display:flex;

justify-content:center;

gap:10px;

flex-wrap:wrap;

}

button{

padding:12px 22px;

border:none;

border-radius:12px;

background:#703B3B;

color:white;

font-size:16px;

cursor:pointer;

transition:.3s;

}

button:hover{

opacity:.85;

}

</style>

</head>

<body>

<div class="card">

<h2>🍅 Focus</h2>

<div class="timer" id="timer">
25:00
</div>

<div class="buttons">

<button onclick="startTimer()">
Start
</button>

<button onclick="pauseTimer()">
Pause
</button>

<button onclick="resetTimer()">
Reset
</button>

</div>

</div>

<script>

let totalSeconds = 25 * 60;

let timer;

let running = false;

function updateDisplay(){

let minutes = Math.floor(totalSeconds / 60);

let seconds = totalSeconds % 60;

document.getElementById("timer").innerHTML =
String(minutes).padStart(2,"0") +
":" +
String(seconds).padStart(2,"0");

}

function startTimer(){

if(running) return;

running = true;

timer = setInterval(()=>{

if(totalSeconds>0){

totalSeconds--;

updateDisplay();

}else{

clearInterval(timer);

running=false;

alert("🎉 Focus session selesai!");

}

},1000);

}

function pauseTimer(){

clearInterval(timer);

running=false;

}

function resetTimer(){

clearInterval(timer);

running=false;

totalSeconds = 25 * 60;

updateDisplay();

}

updateDisplay();

</script>

</body>
</html>
